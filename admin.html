<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 p-8 font-[Inter]">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-10">Admin Control</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="bg-white p-6 rounded-3xl border">
                <h2 class="text-sm font-bold text-gray-400 mb-4 uppercase">Add New Question</h2>
                <input id="qText" type="text" placeholder="Question text..." class="w-full p-3 bg-gray-50 rounded-xl mb-3 border">
                <select id="qCat" class="w-full p-3 bg-gray-50 rounded-xl mb-4 border">
                    <option value="survey">Survey</option>
                    <option value="demographic">Demographic</option>
                </select>
                <button onclick="addQ()" class="w-full bg-black text-white p-3 rounded-xl">Add to Survey</button>
            </div>
            <div class="bg-white p-6 rounded-3xl border">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <div class="bg-white rounded-3xl border overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-xs text-gray-400 uppercase">
                    <tr><th class="p-4">Answer</th><th class="p-4">Duration</th></tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API = "https://your-backend.onrender.com/api"; // UPDATE THIS
        async function addQ() {
            const text = document.getElementById('qText').value;
            const category = document.getElementById('qCat').value;
            await fetch(`${API}/admin/questions`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text, category, is_required: true })
            });
            location.reload();
        }

        async function load() {
            const res = await fetch(`${API}/admin/results`);
            const data = await res.json();
            const rows = document.getElementById('rows');
            data.forEach(d => {
                rows.innerHTML += `<tr class="border-t">
                    <td class="p-4">${d.answer}</td>
                    <td class="p-4 font-mono font-bold">${d.duration_seconds}s</td>
                </tr>`;
            });

            new Chart(document.getElementById('chart'), {
                type: 'bar',
                data: {
                    labels: data.slice(0,10).map((_,i) => i+1),
                    datasets: [{ label: 'Seconds', data: data.map(d => d.duration_seconds), backgroundColor: '#000' }]
                }
            });
        }
        load();
    </script>
</body>
</html>
