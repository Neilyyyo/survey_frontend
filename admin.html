<tbody id="rows" class="divide-y divide-gray-100">
    <script>
        async function load() {
            const res = await fetch(`${API}/admin/results`);
            let data = await res.json();
            
            // Sort by Respondent ID first, then by Time Created
            data.sort((a, b) => a.respondent_id.localeCompare(b.respondent_id));

            const tbody = document.getElementById('rows');
            data.forEach(d => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 border-b border-gray-100">
                        <td class="p-4 font-mono text-[10px] text-purple-600 font-bold">${d.respondent_id}</td>
                        <td class="p-4 text-sm font-medium text-gray-800">${d.question_text}</td>
                        <td class="p-4 text-sm text-gray-600">${d.answer}</td>
                        <td class="p-4 text-sm font-bold text-gray-900">${d.duration_seconds.toFixed(2)}s</td>
                    </tr>`;
            });
        }
        load();
    </script>
</tbody>
