<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f5f5f5 0%, #fafafa 100%); }
        .stat-card { background: linear-gradient(135deg, #f0f9ff 0%, #f0f4ff 100%); border-left: 4px solid #3b82f6; }
        .table-header { background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%); }
        .loader { border: 3px solid #e5e7eb; border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <title>Admin Dashboard - Survey Results</title>
</head>
<body class="min-h-screen py-8 px-4">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">Survey Results</h1>
            <p class="text-gray-500">View and analyze survey responses</p>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="stat-card rounded-lg p-6 shadow-sm">
                <p class="text-gray-600 text-sm font-medium mb-2">Total Responses</p>
                <p class="text-3xl font-bold text-gray-900" id="total-responses">0</p>
            </div>
            <div class="stat-card rounded-lg p-6 shadow-sm" style="border-left-color: #10b981;">
                <p class="text-gray-600 text-sm font-medium mb-2">Unique Respondents</p>
                <p class="text-3xl font-bold text-gray-900" id="unique-respondents">0</p>
            </div>
            <div class="stat-card rounded-lg p-6 shadow-sm" style="border-left-color: #f59e0b;">
                <p class="text-gray-600 text-sm font-medium mb-2">Avg Response Time</p>
                <p class="text-3xl font-bold text-gray-900" id="avg-time">0s</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex gap-3 mb-6 flex-wrap">
            <button onclick="downloadCSV()" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg font-medium transition shadow-sm">
                📥 Download CSV
            </button>
            <button onclick="refreshData()" class="bg-gray-200 hover:bg-gray-300 text-gray-900 px-6 py-2 rounded-lg font-medium transition shadow-sm">
                🔄 Refresh
            </button>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-lg shadow-sm overflow-hidden border border-gray-200">
            <div class="table-header p-6 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">Response Details</h2>
            </div>
            
            <div id="loading-state" class="flex justify-center items-center py-12">
                <div class="loader"></div>
            </div>

            <div id="table-container" style="display: none;">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b border-gray-200 bg-gray-50">
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700">Respondent ID</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700">Question</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700">Answer</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700">Time (s)</th>
                            </tr>
                        </thead>
                        <tbody id="rows" class="divide-y divide-gray-100">
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="error-state" style="display: none;" class="p-6">
                <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                    <p class="text-red-800 font-medium">Failed to load results</p>
                    <p class="text-red-600 text-sm mt-2" id="error-message"></p>
                </div>
            </div>

            <div id="empty-state" style="display: none;" class="p-12 text-center">
                <p class="text-gray-500 text-lg">No responses yet</p>
            </div>
        </div>
    </div>

    <script>
        // API Configuration - Change this to your backend URL
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000/api'
            : 'https://your-backend.onrender.com/api';

        let allData = [];

        async function load() {
            try {
                const res = await fetch(`${API_BASE_URL}/admin/results`);
                if (!res.ok) throw new Error(`API error: ${res.status}`);
                
                allData = await res.json();
                
                if (allData.length === 0) {
                    document.getElementById('loading-state').style.display = 'none';
                    document.getElementById('empty-state').style.display = 'block';
                    return;
                }

                // Sort by Respondent ID first, then by Time Created
                allData.sort((a, b) => a.respondent_id.localeCompare(b.respondent_id));

                // Calculate stats
                const uniqueRespondents = new Set(allData.map(d => d.respondent_id)).size;
                const avgTime = (allData.reduce((sum, d) => sum + (d.duration_seconds || 0), 0) / allData.length).toFixed(2);

                document.getElementById('total-responses').textContent = allData.length;
                document.getElementById('unique-respondents').textContent = uniqueRespondents;
                document.getElementById('avg-time').textContent = avgTime + 's';

                // Render table
                const tbody = document.getElementById('rows');
                tbody.innerHTML = '';
                
                allData.forEach(d => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-50 border-b border-gray-100 transition';
                    row.innerHTML = `
                        <td class="px-6 py-4 text-xs font-mono text-blue-600 font-bold">${escapeHtml(d.respondent_id)}</td>
                        <td class="px-6 py-4 text-sm font-medium text-gray-800 max-w-xs truncate">${escapeHtml(d.question_text)}</td>
                        <td class="px-6 py-4 text-sm text-gray-600 max-w-xs truncate">${escapeHtml(d.answer)}</td>
                        <td class="px-6 py-4 text-sm font-bold text-gray-900">${(d.duration_seconds || 0).toFixed(2)}s</td>
                    `;
                    tbody.appendChild(row);
                });

                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('table-container').style.display = 'block';
            } catch (err) {
                console.error('Failed to load results:', err);
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('error-state').style.display = 'block';
                document.getElementById('error-message').textContent = `${err.message} - Make sure the backend server is running at ${API_BASE_URL}`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function downloadCSV() {
            if (allData.length === 0) {
                alert('No data to download');
                return;
            }

            const headers = ['Respondent ID', 'Question', 'Answer', 'Duration (s)', 'Timestamp'];
            const rows = allData.map(d => [
                d.respondent_id,
                d.question_text,
                d.answer,
                (d.duration_seconds || 0).toFixed(2),
                d.created_at || 'N/A'
            ]);

            let csv = headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `survey_results_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        function refreshData() {
            document.getElementById('loading-state').style.display = 'flex';
            document.getElementById('table-container').style.display = 'none';
            document.getElementById('error-state').style.display = 'none';
            document.getElementById('empty-state').style.display = 'none';
            load();
        }

        load();
    </script>
</body>
</html>
