<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div id="survey-box" class="bg-white p-10 rounded-[32px] shadow-sm border border-gray-100 max-w-md w-full mx-4">
        <div class="h-1.5 w-full bg-gray-100 rounded-full mb-8 overflow-hidden">
            <div id="bar" class="h-full bg-black transition-all duration-500" style="width: 0%"></div>
        </div>
        <p id="cat" class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-2"></p>
        <h1 id="q-text" class="text-2xl font-semibold text-gray-900 mb-8 leading-tight">Loading...</h1>
        <input type="text" id="ans" placeholder="Your answer..." class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-black mb-6">
        <button onclick="handleNext()" class="w-full bg-black text-white p-4 rounded-2xl font-semibold hover:bg-gray-800 transition">Continue</button>
    </div>

    <script>
        const API = "https://your-backend.onrender.com/api"; // UPDATE THIS
        let questions = [], index = 0, startTime;

        async function start() {
            const res = await fetch(`${API}/questions`);
            questions = await res.json();
            render();
        }

        function render() {
            if (index < questions.length) {
                const q = questions[index];
                document.getElementById('q-text').innerText = q.text;
                document.getElementById('cat').innerText = q.category;
                document.getElementById('ans').value = "";
                document.getElementById('bar').style.width = `${(index / questions.length) * 100}%`;
                startTime = Date.now();
            } else {
                document.getElementById('survey-box').innerHTML = `<h1 class="text-center text-xl font-bold">Survey Completed.</h1>`;
            }
        }

        async function handleNext() {
            const time = (Date.now() - startTime) / 1000;
            const answer = document.getElementById('ans').value || "N/A";
            await fetch(`${API}/submit`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ question: questions[index].text, answer, duration: time })
            });
            index++;
            render();
        }
        start();
    </script>
</body>
</html>
