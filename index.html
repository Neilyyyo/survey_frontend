<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0ebf8; }
        .form-header { border-top: 10px solid #673ab7; }
        .question-card:focus-within { border-left: 5px solid #673ab7; border-left-width: 6px; }
    </style>
    <title>Student Survey Form</title>
</head>
<body class="py-10 px-4">
    <div class="max-w-3xl mx-auto space-y-4">
        <div class="bg-white rounded-lg shadow-sm p-8 form-header">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">General Student Survey</h1>
            <p class="text-sm text-gray-600 mb-4">Please answer the following questions. Demographic info is optional.</p>
            <span class="text-red-500 text-xs">* Indicates required</span>
        </div>

        <form id="survey-form" class="space-y-4">
            <div class="bg-white rounded-lg shadow-sm p-8 border border-gray-200 question-card">
                <label class="block text-base font-medium mb-4">Full Name <span class="text-gray-400 font-normal">(Optional)</span></label>
                <input type="text" id="demo-name" onfocus="startTimer('Name')" placeholder="Your answer" class="w-full border-b border-gray-300 focus:border-[#673ab7] focus:outline-none py-2 transition-all">
            </div>

            <div class="bg-white rounded-lg shadow-sm p-8 border border-gray-200 question-card">
                <label class="block text-base font-medium mb-4">Age <span class="text-gray-400 font-normal">(Optional)</span></label>
                <input type="number" id="demo-age" onfocus="startTimer('Age')" placeholder="Your answer" class="w-full border-b border-gray-300 focus:border-[#673ab7] focus:outline-none py-2 transition-all">
            </div>

            <div class="bg-white rounded-lg shadow-sm p-8 border border-gray-200 question-card">
                <label class="block text-base font-medium mb-4">Gender <span class="text-gray-400 font-normal">(Optional)</span></label>
                <input type="text" id="demo-gender" onfocus="startTimer('Gender')" placeholder="Your answer" class="w-full border-b border-gray-300 focus:border-[#673ab7] focus:outline-none py-2 transition-all">
            </div>

            <div class="bg-white rounded-lg shadow-sm p-8 border border-gray-200 question-card">
                <label class="block text-base font-medium mb-4">Year Level & Section <span class="text-gray-400 font-normal">(Optional)</span></label>
                <input type="text" id="demo-section" onfocus="startTimer('Section')" placeholder="Your answer" class="w-full border-b border-gray-300 focus:border-[#673ab7] focus:outline-none py-2 transition-all">
            </div>

            <div id="dynamic-questions" class="space-y-4"></div>

            <div class="py-6">
                <button type="submit" class="bg-[#673ab7] text-white px-10 py-2.5 rounded-md shadow hover:bg-[#5e35a6] font-medium transition">Submit</button>
            </div>
        </form>
    </div>

    <script>
        const API = "https://your-backend.onrender.com/api"; 
        const respondentId = 'resp_' + Math.random().toString(36).substr(2, 9);
        let dynamicData = [];
        let timers = {};

        function startTimer(key) {
            if (!timers[key]) timers[key] = Date.now();
        }

        async function init() {
            const res = await fetch(`${API}/questions`);
            dynamicData = await res.json();
            const list = document.getElementById('dynamic-questions');

            dynamicData.filter(q => q.category !== 'demographic').forEach((q, i) => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-lg shadow-sm p-8 border border-gray-200 question-card";
                div.innerHTML = `
                    <label class="block text-base font-medium mb-4">${q.text} ${q.is_required ? '<span class="text-red-500">*</span>' : ''}</label>
                    <input type="text" id="q-${i}" onfocus="startTimer('q-${i}')" placeholder="Your answer" class="w-full border-b border-gray-300 focus:border-[#673ab7] focus:outline-none py-2 transition-all">
                `;
                list.appendChild(div);
            });
        }

        document.getElementById('survey-form').onsubmit = async (e) => {
            e.preventDefault();
            
            const allSubmissions = [];

            // 1. Collect Demographics
            const demos = [
                { q: "Name", val: document.getElementById('demo-name').value },
                { q: "Age", val: document.getElementById('demo-age').value },
                { q: "Gender", val: document.getElementById('demo-gender').value },
                { q: "Section", val: document.getElementById('demo-section').value }
            ];

            demos.forEach(d => {
                allSubmissions.push({
                    respondent_id: respondentId,
                    question: d.q,
                    answer: d.val || "N/A",
                    duration: timers[d.q] ? (Date.now() - timers[d.q]) / 1000 : 0
                });
            });

            // 2. Collect Dynamic Questions
            dynamicData.filter(q => q.category !== 'demographic').forEach((q, i) => {
                const val = document.getElementById(`q-${i}`).value;
                allSubmissions.push({
                    respondent_id: respondentId,
                    question: q.text,
                    answer: val || "N/A",
                    duration: timers[`q-${i}`] ? (Date.now() - timers[`q-${i}`]) / 1000 : 0
                });
            });

            // Send all to DB
            for (const sub of allSubmissions) {
                await fetch(`${API}/submit`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(sub)
                });
            }

            document.body.innerHTML = `<div class="flex items-center justify-center min-h-screen text-2xl font-bold">Thank you! Your response is saved.</div>`;
        };

        init();
    </script>
</body>
</html>
